<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quiz Time</title>
    <link rel="icon" type="image/x-icon" href="/images/logo.svg" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <!-- First Page -->
      <div class="container">
        <img src="./images/logo.svg" alt="logo" class="logo" />
        <button class="start">Start > > ></button>
        <span class="highest-score">Highest Score 20/25</span>
      </div>

      <!-- Second page -->
      <div class="quiz-container">
        <section>
          <div class="head">
            <img src="./images/logo.svg" alt="" class="head-logo" />
            <span class="material-symbols-outlined"> volume_up </span>
          </div>
        </section>
        <section>
          <div class="quiz-num-container">
            <h1 class="quiz-num">02/25</h1>
          </div>
        </section>
        <section>
          <p class="quiz-question">
            Inside which HTML element do we put the JavaScript?
          </p>
        </section>
        <section>
          <span class="quiz-timer">00:30</span>
        </section>
        <section>
          <div class="answer-container">
            <div class="option" id="first">
              <h3>A</h3>
              <span class="right">
                <h4>You Choose</h4>
                <img
                  src="./images/wrong.svg"
                  class="wrong-logo"
                  alt="wrong-logo"
                />
                <img
                  src="./images/correct.svg"
                  class="correct-logo"
                  alt="correct-logo"
                />
              </span>
            </div>
            <div class="option" id="second">
              <h3>B</h3>
              <span class="right">
                <h4>You Choose</h4>
                <img
                  src="./images/wrong.svg"
                  class="wrong-logo"
                  alt="wrong-logo"
                />
                <img
                  src="./images/correct.svg"
                  class="correct-logo"
                  alt="correct-logo"
                />
              </span>
            </div>
            <div class="option" id="third">
              <h3>C</h3>
              <span class="right">
                <h4>You Choose</h4>
                <img
                  src="./images/wrong.svg"
                  class="wrong-logo"
                  alt="wrong-logo"
                />
                <img
                  src="./images/correct.svg"
                  class="correct-logo"
                  alt="correct-logo"
                />
              </span>
            </div>
            <div class="option" id="four">
              <h3>D</h3>
              <span class="right">
                <h4>You Choose</h4>
                <img
                  src="./images/wrong.svg"
                  class="wrong-logo"
                  alt="wrong-logo"
                />
                <img
                  src="./images/correct.svg"
                  class="correct-logo"
                  alt="correct-logo"
                />
              </span>
            </div>
          </div>
        </section>
        <span class="next">Next ></span>
      </div>

      <!-- Third page -->
      <div class="result">
        <img src="./images/logo.svg" alt="logo" class="logo" />
        <h3 class="title">Result</h3>
        <section class="bar-chart">
          <div class="outer">
            <div class="inner"></div>
          </div>
          <div class="left-line"></div>
          <div class="left-dot"></div>
          <h5 class="score">23/25</h5>
          <div class="right-line"></div>
          <div class="right-dot"></div>
          <h5 class="correct">70%</h5>
          <h5 class="wrong">30%</h5>
        </section>
        <div class="good-score">
          <h3>“Keep learning, you have a good score!”</h3>
          <button class="retry"><< Retry</button>
        </div>
      </div>
    </main>
    <footer>
      <span class="made-with">Made with ❤️ by Rohan Chougule</span>
    </footer>
  </body>
</html>
